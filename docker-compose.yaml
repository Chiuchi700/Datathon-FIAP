---
x-airflow-common:
  &airflow-common
  #image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.2.0}
  build: .
  image: meu-projeto-ml-airflow:latest
  env_file: [.env]
  dns:
    - 8.8.8.8
    - 1.1.1.1
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    # Usa variáveis do .env para montar a string de conexão
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    # Força o uso do banco de dados para login (essencial na v3)
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    # Permite que a API e a Interface usem o mesmo gerenciador
    AIRFLOW__API__AUTH_STRATEGY: airflow.api.auth.backend.session
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    # O Airflow vai ler o pyproject.toml que "apareceu" em /opt/airflow/project
    #_PIP_ADDITIONAL_REQUIREMENTS: "-e /opt/airflow/project"
    # Isso permite que você dê 'import src' em qualquer lugar
    PYTHONPATH: "/opt/airflow/project"
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    USER: "airflow"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./plugins:/opt/airflow/plugins
    # O PONTO (.) aqui indica a RAIZ do seu repositório onde está o YAML
    - .:/opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis: { condition: service_healthy }
    postgres: { condition: service_healthy }

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
    restart: always

  redis:
    image: redis:7.2-bookworm
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      # Rota específica da API v2/v3 para monitoramento
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init: { condition: service_completed_successfully }

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init: { condition: service_completed_successfully }

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      # yamllint disable rule:line-length
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    user: "${AIRFLOW_UID:-50000}:0"
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins,config}
        mkdir -p /opt/airflow/project/{data/raw,data/processed,models,reports,artifacts/plots,mlartifacts}
        # chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow
        # O migrate v3 processa as variáveis _AIRFLOW_WWW_USER automaticamente

        # GARANTE QUE O BANCO MLFLOW EXISTE COMO ARQUIVO (evita pasta fantasma do Docker)
        if [ ! -f /opt/airflow/project/mlflow.db ]; then
          touch /opt/airflow/project/mlflow.db
        fi
        
        /entrypoint airflow db migrate

        # CRIAÇÃO DO USUÁRIO VISITANTE USANDO O .ENV
        airflow users create \
          --username "${VISITANTE_USERNAME}" \
          --password "${VISITANTE_PASSWORD}" \
          --firstname Visitante \
          --lastname Datathon \
          --role Viewer \
          --email visitante@example.com || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
      _AIRFLOW_WWW_USER_ROLE: 'Admin'
      _AIRFLOW_WWW_USER_EMAIL: 'admin@example.com'
      _PIP_ADDITIONAL_REQUIREMENTS: ''

  fastapi-app:
    image: python:3.12-slim
    container_name: fastapi-service
    dns:
      - 8.8.8.8
    volumes:
      - ./fast_api:/app
    working_dir: /app
    ports:
      - "8000:8000"
    command: >
      bash -c "pip install --no-cache-dir fastapi uvicorn requests prometheus-fastapi-instrumentator && 
               uvicorn main:app --host 0.0.0.0 --port 8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - fastapi-app
      - cadvisor
      - airflow-apiserver
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    dns:
      - 8.8.8.8
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,frser-sqlite-datasource
      # ATIVA ACESSO VISITANTE AUTOMÁTICO:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./mlflow.db:/opt/mlflow.db:ro

  mlflow-ui:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_ui
    expose:
      - "5000"
    ports:
      - "5001:5000"
    volumes:
      - .:/opt/airflow/project
    working_dir: /opt/airflow/project
    command: >
      mlflow ui --backend-store-uri sqlite:///mlflow.db 
                --default-artifact-root /opt/airflow/project/mlartifacts 
                --host 0.0.0.0

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    devices:
      - /dev/kmsg
    restart: always

volumes:
  postgres-db-volume:
