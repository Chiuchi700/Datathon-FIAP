---
x-airflow-common:
  &airflow-common
  #image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:3.2.0}
  build: .
  image: meu-projeto-ml-airflow:latest
  env_file: [.env]
  dns:
    - 8.8.8.8
    - 1.1.1.1
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    # Usa variáveis do .env para montar a string de conexão
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    # Força o uso do banco de dados para login (essencial na v3)
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    # Permite que a API e a Interface usem o mesmo gerenciador
    AIRFLOW__API__AUTH_STRATEGY: airflow.api.auth.backend.session
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__METRICS__METRICS_ALLOW_LIST: ".*"
    AIRFLOW__METRICS__STATSD_ON: "True"
    AIRFLOW__METRICS__STATSD_HOST: "prometheus"
    AIRFLOW__METRICS__STATSD_PORT: "9125"
    # _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    # O Airflow vai ler o pyproject.toml que "apareceu" em /opt/airflow/project
    #_PIP_ADDITIONAL_REQUIREMENTS: "-e /opt/airflow/project"
    # Isso permite que você dê 'import src' em qualquer lugar
    PYTHONPATH: "/opt/airflow/project"
    AIRFLOW_CONFIG: '/opt/airflow/config/airflow.cfg'
    USER: "airflow"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./plugins:/opt/airflow/plugins
    # O PONTO (.) aqui indica a RAIZ do seu repositório onde está o YAML
    - .:/opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis: { condition: service_healthy }
    postgres: { condition: service_healthy }

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5
    restart: always

  redis:
    image: redis:7.2-bookworm
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow-apiserver
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      # Rota específica da API v2/v3 para monitoramento
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init: { condition: service_completed_successfully }

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init: { condition: service_completed_successfully }

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    command: celery worker
    healthcheck:
      # yamllint disable rule:line-length
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    user: "${AIRFLOW_UID:-50000}:0"
    command:
      - -c
      - |
        # 1. Cria a estrutura de pastas
        mkdir -p /opt/airflow/{logs,dags,plugins,config}
        mkdir -p /opt/airflow/project/{data/raw,data/processed,models,mlartifacts,chroma_data,ollama_data}

        # 2. Garante o arquivo do MLflow e as PERMISSÕES (Solução para o erro de readonly)
        if [ ! -f /opt/airflow/project/mlflow.db ]; then
          touch /opt/airflow/project/mlflow.db
        fi
        # Garante que o banco e a pasta de artefatos sejam graváveis por qualquer usuário do container
        chmod 666 /opt/airflow/project/mlflow.db
        chmod -R 777 /opt/airflow/project/mlartifacts

        # 3. Migra o banco do Airflow
        /entrypoint airflow db migrate

        # 4. Criação do usuário visitante
        airflow users create \
          --username "${VISITANTE_USERNAME}" \
          --password "${VISITANTE_PASSWORD}" \
          --firstname Visitante \
          --lastname Datathon \
          --role Viewer \
          --email visitante@example.com || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
      _AIRFLOW_WWW_USER_ROLE: 'Admin'
      _AIRFLOW_WWW_USER_EMAIL: 'admin@example.com'
      _PIP_ADDITIONAL_REQUIREMENTS: ''

  fastapi-app:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    image: meu-projeto-ml-fastapi:latest  # Nomeia a imagem gerada
    container_name: fastapi-service
    restart: always
    dns:
      - 8.8.8.8
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - REGISTERED_MODEL_NAME=nike_lstm_forecaster
      - MODEL_ALIAS=candidate
      - RAW_DATA_PATH=src/data/raw/nike_raw.csv
      # --- AJUSTES MCP E RAG ---
      - FASTAPI_BASE_URL=http://fastapi-service:8000
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000              # Porta interna do container
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
    depends_on:
      - prometheus
      - chromadb
      - ollama-pull

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - cadvisor
      - airflow-apiserver
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    dns:
      - 8.8.8.8
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,frser-sqlite-datasource
      # ATIVA ACESSO VISITANTE AUTOMÁTICO:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./mlflow.db:/opt/mlflow.db:ro

  mlflow-ui:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_ui
    expose:
      - "5000"
    ports:
      - "5001:5000"
    volumes:
      - .:/opt/airflow/project
    working_dir: /opt/airflow/project
    command: >
      mlflow ui --backend-store-uri sqlite:////opt/airflow/project/mlflow.db 
            --default-artifact-root /opt/airflow/project/mlartifacts 
            --host 0.0.0.0

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/lib/dbus/machine-id:/var/lib/dbus/machine-id:ro
    devices:
      - /dev/kmsg
    restart: always
  
  # --- Serviços de IA Adicionados ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama pull llama3.2:1b && ollama pull nomic-embed-text"
    restart: "no"

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    restart: unless-stopped

volumes:
  postgres-db-volume:
  ollama-data:         # Adicionado para os modelos LLM
  chroma-data:         # Adicionado para o banco de vetores