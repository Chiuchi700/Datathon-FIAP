global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-apiserver:8080']
  - job_name: 'fastapi'
    static_configs:
      - targets: ['fastapi-app:8000']
  - job_name: 'docker-containers'
    static_configs:
      - targets: ['cadvisor:8080']